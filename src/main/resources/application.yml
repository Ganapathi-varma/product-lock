# src/main/resources/application.yml
spring:
  application:
    name: product-lock
  
  datasource:
    url: jdbc:h2:mem:productlockdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# Logging
logging:
  level:
    com.example.productlock: DEBUG
    org.springframework.web: INFO
